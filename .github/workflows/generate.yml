# Hand-authored by this repository (not generated by the platform flake) —
# per FOM-51: "the repository itself owns the generation workflow." This is
# what triggers on a Renovate flake.lock bump and fails the PR if generated
# output would drift from what's checked in.
name: Repository Generation

on:
  pull_request:
    paths:
      - "flake.lock"
      - "repo.nix"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: generate repository files
        run: nix run .#generate

      - name: fail if generated output drifted
        run: git diff --exit-code
